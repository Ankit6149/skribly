name: Install approved design asset

on:
  pull_request:
    types: [opened, synchronize, reopened]
    paths:
      - "assets/design/.repair-trigger"
      - "assets/design/.repair-trigger-note"
      - "assets/design/.upload-webp/**"
      - ".github/workflows/install-design-asset.yml"

permissions:
  contents: write

jobs:
  install:
    if: >-
      github.actor != 'github-actions[bot]' &&
      github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    steps:
      - name: Check out repair branch
        uses: actions/checkout@v4
        with:
          repository: ${{ github.event.pull_request.head.repo.full_name }}
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0

      - name: Verify all source chunks
        shell: bash
        run: |
          set -euo pipefail
          echo "c9fb2fbc3365282361c337213477b6b32413f92d0b6170dd72056d626e9dcc67  assets/design/.upload-webp/chunk-00.txt" | sha256sum --check --strict
          echo "112adb843fb7b85b2973ecfd7aef488a873e68e8783a4e48663121846a8b2f2a  assets/design/.upload-webp/chunk-01.txt" | sha256sum --check --strict
          echo "7a344c51ea6c34bbe535460bda12cdbffd315e489ab2692ccc62251d4a5921cc  assets/design/.upload-webp/chunk-02.txt" | sha256sum --check --strict
          echo "088d632df11c842a5ea353e57f9e0afacd0e05637837f212f532b5b8ff72546e  assets/design/.upload-webp/chunk-03-00.txt" | sha256sum --check --strict
          echo "de3ebe4db0a8876f97432bc576fe53af91d20944059d127c09e0040b39109ff3  assets/design/.upload-webp/chunk-03-01.txt" | sha256sum --check --strict
          echo "6942b3ebd334c575c48ad10f08a08fd69f5dd02a0b9cdd37dd9101266dc6be2e  assets/design/.upload-webp/chunk-03-02.txt" | sha256sum --check --strict
          echo "2e93b66b6ea37ed259ca8c2f307b0848960ecedeafb54875bdcc0e5fae3671df  assets/design/.upload-webp/chunk-03-03.txt" | sha256sum --check --strict
          echo "7ad158f1eef00d93d5967094f249698301deff4fcf7d9abc5b6c1b2c6206c7b6  assets/design/.upload-webp/chunk-03-04.txt" | sha256sum --check --strict
          echo "99af611305f22072507ad1582bcc7a802c8d7e20734ea8beee5e12b1d8851231  assets/design/.upload-webp/chunk-04.txt" | sha256sum --check --strict
          echo "08284fe52b6ff601ea7a4bba237dfde6eb9ccf50b2e618adc1e4d35922b45c50  assets/design/.upload-webp/chunk-05.txt" | sha256sum --check --strict
          echo "181a1120263e2a8623080726daeec71c351f56624fb4cbadb7c725f024d6068e  assets/design/.upload-webp/chunk-06.txt" | sha256sum --check --strict
          echo "74636267b7d3c302858971769ca20244666e2d3e48eb5a18e32cc74cbcace9a0  assets/design/.upload-webp/chunk-07-00.txt" | sha256sum --check --strict
          echo "f9b39dca301f21f4e8c5da1d1c92db1ed3eaf4345e5a83b60bacbb30b8c0a7b1  assets/design/.upload-webp/chunk-07-01.txt" | sha256sum --check --strict
          echo "a317c7a72ea4d62b2791ae02f2c589ce5f8eb86ccdfe01aac959d67ad42168b8  assets/design/.upload-webp/chunk-07-02.txt" | sha256sum --check --strict

      - name: Reconstruct and verify approved design
        shell: bash
        run: |
          set -euo pipefail
          cat \
            assets/design/.upload-webp/chunk-00.txt \
            assets/design/.upload-webp/chunk-01.txt \
            assets/design/.upload-webp/chunk-02.txt \
            assets/design/.upload-webp/chunk-03-00.txt \
            assets/design/.upload-webp/chunk-03-01.txt \
            assets/design/.upload-webp/chunk-03-02.txt \
            assets/design/.upload-webp/chunk-03-03.txt \
            assets/design/.upload-webp/chunk-03-04.txt \
            assets/design/.upload-webp/chunk-04.txt \
            assets/design/.upload-webp/chunk-05.txt \
            assets/design/.upload-webp/chunk-06.txt \
            assets/design/.upload-webp/chunk-07-00.txt \
            assets/design/.upload-webp/chunk-07-01.txt \
            assets/design/.upload-webp/chunk-07-02.txt \
            | base64 --decode \
            > assets/design/direction-1-soft-paper-play.webp
          test "$(stat -c '%s' assets/design/direction-1-soft-paper-play.webp)" = "56930"
          echo "82866cda993f48f4f82bbdb74ca14ba7a8717218918a4404c1156f3895aa73c8  assets/design/direction-1-soft-paper-play.webp" | sha256sum --check --strict
          file assets/design/direction-1-soft-paper-play.webp

      - name: Update references and remove repair files
        shell: bash
        run: |
          set -euo pipefail
          grep -rl --exclude-dir=.git 'direction-1-soft-paper-play.jpg' . | xargs -r sed -i 's/direction-1-soft-paper-play\.jpg/direction-1-soft-paper-play.webp/g'
          rm -f assets/design/direction-1-soft-paper-play.jpg
          rm -rf assets/design/.upload assets/design/.upload-webp
          rm -f assets/design/.upload-base64.txt assets/design/full-resolution-upload-instructions.txt assets/design/full-resolution-design-note.md
          rm -f assets/design/.repair-trigger assets/design/.repair-trigger-note
          rm -f .github/workflows/install-design-asset.yml

      - name: Commit clean repaired repository
        shell: bash
        env:
          REPAIR_BRANCH: ${{ github.event.pull_request.head.ref }}
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "fix: install clear Soft Paper Play design asset"
          git push origin "HEAD:${REPAIR_BRANCH}"
